			<script>
				function add_image (i) {
					let grid = document.getElementsByClassName("grid")[0];
					let div = document.createElement("div");
					let div_inner = document.createElement("div");
					div_inner.setAttribute("class", "inner");
					let a = document.createElement("a");
					a.href = "images/landscapes/originals/"+alt[i-1]+".jpg";
					a.setAttribute('data-lightbox', 'roadtrip');
					let img = document.createElement("img");
					img.src = "images/landscapes/"+alt[i-1]+".webp";
					img.alt = alt[i-1];
					if (i>1) {img.setAttribute('loading', 'lazy');}
					else {img.setAttribute('loading', 'eager');}
					img.width = "576";
					img.height = h[i-1];	
					
					let img_a = document.createElement("img");
					img_a.src = "images/landscapes/"+alt[i-1]+".webp";
					img_a.alt = alt[i-1];
					img_a.id = alt[i-1];
					img_a.width = "576";
					img_a.height = h[i-1];
					
					if (alt[i-1]=="Man_in_field" || alt[i-1]=="sky_pink_ground" || alt[i-1]=="water_ships_bold" || alt[i-1]=="field_night_1" || alt[i-1]=="pink_sky_green_field") {
						img_a.style.width = "58%";
					} else{}
					
					a.appendChild(img_a);
					div_inner.appendChild(a);
					div_inner.appendChild(img);
					div.appendChild(div_inner);
					grid.appendChild(div);
					
				}
				for (let i=1; i<=alt.length;i++) {
					add_image(i);
				}
				
			</script>
			
			<script>
				function myFunction(x) {
					if (x.matches) { // If media query matches
    					FlexMasonry.init('.grid', {
    						/* here the breakpoints are different because the pictures are to be a bit bigger, because there are not so many */
    						breakpointCols: { 
        						'min-width: 1600px': 6,
        						'min-width: 1400px': 5,
        						'min-width: 1150px': 4,
        						'min-width: 900px': 3,
        						'min-width: 650px': 2,
    							}
    						}
    					);
  					} else {}
				}
				
				var x = window.matchMedia("(min-width: 576px)")
				myFunction(x) // Call listener function at run time
				x.addListener(myFunction) // Attach listener function on state changes
			</script>
