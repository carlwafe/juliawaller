				<script>

					h[9] = "769";
					alt[10] = "boy_with_ball";
					h[10] = "648";
					
					function add_image (i) {
						var grid = document.getElementsByClassName("grid")[0];
						
						var div = document.createElement("div");
						
						var div_inner = document.createElement("div");
						div_inner.setAttribute("class", "inner");
						
						var a = document.createElement("a");
						a.href = "images/sculptures/originals/"+alt[i-1]+".jpg";
						a.setAttribute('data-lightbox', 'roadtrip');
						
						var img = document.createElement("img");
						img.src = "images/sculptures/"+alt[i-1]+".webp";
						img.alt = alt[i-1];
						img.width = "576";
						img.height = h[i-1];
						if (i>1) {img.setAttribute('loading', 'lazy');}
						else {img.setAttribute('loading', 'eager');}
						
						var img_a = document.createElement("img");
						img_a.src = "images/sculptures/"+alt[i-1]+".webp";
						img_a.alt = alt[i-1];
						img_a.width = "576";
						img_a.height = h[i-1];
						
						a.appendChild(img_a);
						div_inner.appendChild(a);
						div_inner.appendChild(img);
						div.appendChild(div_inner);
						grid.appendChild(div);
					}
					
					for (let i=1; i<=alt.length;i++) {
						add_image(i);
					}
				</script>
				
				<script>
