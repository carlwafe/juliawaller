		<main>
			<div id="inner_content">
				<div class="grid"> </div>
				<script>
					const alt = [];
					const h = [];
					alt[0] = "elga";
					h[0] = "436";
					alt[1] = "dots";
					h[1] = "444";
					alt[2] = "woman_lying";
					h[2] = "427";
					alt[3] = "woman_dancing";
					h[3] = "720";
					alt[4] = "touch";
					h[4] = "585";
					alt[5] = "cup";
					h[5] = "576";
					alt[6] = "woman_red";
					h[6] = "775";
					alt[7] = "woman_red2";
					h[7] = "795";
					alt[8] = "woman_yellow";
					h[8] = "792";
					alt[9] = "chin";
					h[9] = "1090";
					alt[10] = "two_woman";
					h[10] = "794";
					alt[11] = "mom_2";
					h[11] = "468"
					alt[12] = "dog_golden";
					h[12] = "576";
					alt[13] = "oven";
					h[13] = "1578";
					alt[14] = "kiss";
					h[14] = "847";
					
					function add_image (i) {
						let grid = document.getElementsByClassName("grid")[0];
						let div = document.createElement("div");
						let div_inner = document.createElement("div");
						div_inner.setAttribute("class", "inner");
						let a = document.createElement("a");
						a.href = "images/drawings/originals/"+alt[i-1]+".jpg";
						a.setAttribute('data-lightbox', 'roadtrip');
						let img = document.createElement("img");
						img.src = "images/drawings/"+alt[i-1]+".webp";
						img.alt = alt[i-1];
						if (i>1) {img.setAttribute('loading', 'lazy');}
						else {img.setAttribute('loading', 'eager');}
						if (alt[i-1] == "cup") {img.width = "564";}
						else {img.width = "576";}
						img.height = h[i-1];	
					
						let img_a = document.createElement("img");
						img_a.src = "images/drawings/"+alt[i-1]+".webp";
						img_a.alt = alt[i-1];
						img_a.id = alt[i-1];
						img_a.width = "576";
						img_a.height = h[i-1];
					
						if (alt[i-1]=="dog_blue" || alt[i-1]=="dog_golden" || alt[i-1]=="dog_bronze") {
							img_a.style.width = "58%";
						} else{}
					
						a.appendChild(img_a);
						div_inner.appendChild(a);
						div_inner.appendChild(img);
						div.appendChild(div_inner);
						grid.appendChild(div);
					}
					
					for (let i=1; i<=alt.length;i++) {
						add_image(i);
					}
					
				</script>

				<script>
					function myFunction(x) {
						if (x.matches) { // If media query matches
    						FlexMasonry.init('.grid');
  						} 
  						else {
  						}
					}

					var x = window.matchMedia("(min-width: 576px)")
					myFunction(x) // Call listener function at run time
					x.addListener(myFunction) // Attach listener function on state changes
				</script>
